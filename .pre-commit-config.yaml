repos:
  - repo: local
    hooks:
      - id: mise-format
        name: mise format
        entry: mise run format
        language: system
        pass_filenames: false
      - id: mise-lint
        name: mise lint
        entry: mise run lint
        language: system
        pass_filenames: false
      - id: mise-typecheck
        name: mise typecheck
        entry: mise run typecheck
        language: system
        pass_filenames: false
