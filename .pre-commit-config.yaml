repos:
  - repo: local
    hooks:
      - id: docs-fix-restage
        name: docs fix and restage
        entry: ./scripts/precommit-docs-fix.sh
        language: system
        files: (^\.prettierrc$)|(\.(md|yaml|yml|json)$)
        stages: [pre-commit]
      - id: prettier-check
        name: prettier check
        entry: mise run prettier-check
        language: system
        pass_filenames: false
        stages: [pre-commit, pre-push]
      - id: markdownlint-check
        name: markdownlint check
        entry: mise run markdownlint-check
        language: system
        pass_filenames: false
        stages: [pre-commit, pre-push]
      - id: gitleaks
        name: gitleaks secret scan
        entry: mise run secret-scan
        language: system
        pass_filenames: false
        stages: [pre-commit, pre-push]
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix .
        language: system
        pass_filenames: false
      - id: ruff-format-check
        name: ruff format check
        entry: uv run ruff format --check .
        language: system
        pass_filenames: false
      - id: mypy
        name: mypy
        entry: uv run mypy src/
        language: system
        pass_filenames: false
