name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up mise tools
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Install dependencies
        run: mise exec -- uv sync

      - name: Run tests
        run: mise run test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up mise tools
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Install dependencies
        run: mise exec -- uv sync

      - name: Run lint
        run: mise run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up mise tools
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Install dependencies
        run: mise exec -- uv sync

      - name: Run mypy
        run: mise run typecheck

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up mise tools
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Install dependencies
        run: npm ci

      - name: Run format checks
        run: mise run format-check
