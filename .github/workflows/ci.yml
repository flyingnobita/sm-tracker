name: CI

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up mise tools
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Install dependencies
        run: mise exec -- uv sync

      - name: Run tests
        run: mise run test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up mise tools
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Install dependencies
        run: mise exec -- uv sync

      - name: Run lint
        run: mise run lint-check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up mise tools
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Install dependencies
        run: mise exec -- uv sync

      - name: Run mypy
        run: mise run typecheck

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up mise tools
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Install dependencies
        run: npm ci

      - name: Run format checks
        run: mise run format-check

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up mise tools
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Run secret scan
        run: mise run secret-scan

  smoke-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up mise tools
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Build and smoke test wheel install
        run: |
          rm -rf dist .venv-smoke
          uv build
          uv venv .venv-smoke
          uv pip install --python .venv-smoke/bin/python dist/*.whl
          .venv-smoke/bin/sm-tracker help >/dev/null
          .venv-smoke/bin/python -m sm_tracker help >/dev/null
