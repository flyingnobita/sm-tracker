# mise: package and tool management (this machine only)
# Python deps and tasks use uv

[hooks]
postinstall = "uv run pre-commit install && uv run pre-commit install --hook-type pre-push"

[env]
_.python.venv = { path = ".venv", create = true }

[tools]
python = "3.12"
node = "lts"

[tasks]
# Run before pushing to validate the full test suite.
test = "uv run pytest"
# Run opt-in live integration tests against real platform APIs using local .env credentials.
test-real = "uv run pytest -m integration"
# Run during development to auto-fix Ruff issues, then enforce CI-style Ruff checks.
lint = "uv run ruff check --fix . && uv run ruff format . && uv run ruff check . && uv run ruff format --check ."
# Run in CI/push gates to enforce Ruff without mutating files.
lint-check = "uv run ruff check . && uv run ruff format --check ."
# Run after Python changes to confirm static typing stays green.
typecheck = "uv run mypy src/"
# Run when editing docs/config files to auto-format with Prettier.
prettier-fix = "npx prettier --write \"**/*.{md,yaml,yml,json}\" \".prettierrc\""
# Run before commit/push to verify Prettier formatting is clean.
prettier-check = "npx prettier --check \"**/*.{md,yaml,yml,json}\" \".prettierrc\""
# Run when editing Markdown docs to apply markdownlint auto-fixes where possible.
markdownlint-fix = "npx markdownlint-cli2 --fix \"**/*.md\""
# Run before commit/push to verify Markdown lint rules pass.
markdownlint-check = "npx markdownlint-cli2 \"**/*.md\""

# Run when you want one command to fix docs/config formatting issues.
format = "mise run prettier-fix && mise run markdownlint-fix"
# Run before commit/push to validate docs/config formatting and markdown lint.
format-check = "mise run prettier-check && mise run markdownlint-check"
# Run if pre-commit hooks are configured and you want hook parity locally.
precommit = "uv run pre-commit run --all-files"
# Run as the one-shot local CI gate (lint + types + docs format + tests).
check = "mise run lint-check && mise run typecheck && mise run format-check && mise run test"
# Run before cutting a release to rebuild fresh distributions from a green tree.
release-build = "mise run check && uv build --out-dir dist-release"
# Run after release-build to validate the release artifacts that will be uploaded.
release-check = "uvx twine check ./dist-release/*"
