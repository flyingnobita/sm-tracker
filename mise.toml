# mise: package and tool management (this machine only)
# Python deps and tasks use uv

[tools]
python = "3.12"
node = "lts"
uv = "latest"

[tasks]
test = "uv run pytest"
lint = "npx markdownlint-cli2 \"**/*.md\" && uv run ruff check ."
typecheck = "uv run mypy src/"
format = "npx prettier --write \"**/*.{md,yaml,yml,json}\" \".prettierrc\" \".prettierrc.*\" \"**/.prettierrc\" \"**/.prettierrc.*\""
precommit = "pre-commit run --all-files"
check = "mise run lint && mise run typecheck && mise run test"
